<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מחשבון מונדיאל אינטראקטיבי</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
            color: #333;
        }
        h1, h2 {
            text-align: center;
            color: #1b4332;
        }
        .container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
            max-width: 1350px;
            margin: 0 auto;
        }
        .panel {
            flex: 1;
            min-width: 350px;
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .instruction {
            font-size: 0.9em;
            color: #666;
            text-align: center;
            margin-bottom: 15px;
        }
        ul.sortable-list {
            list-style: none;
            padding: 0;
            margin: 0;
            max-height: 75vh;
            overflow-y: auto;
            border: 1px solid #ddd;
            border-radius: 4px;
            padding: 10px;
        }
        ul.sortable-list li {
            background: #e9ecef;
            padding: 10px 15px;
            margin-bottom: 8px;
            border-radius: 4px;
            cursor: grab;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-right: 4px solid #2d6a4f;
            transition: background 0.2s;
            user-select: none;
        }
        ul.sortable-list li:active {
            cursor: grabbing;
        }
        ul.sortable-list li.dragging {
            opacity: 0.5;
            background: #d8f3dc;
        }
        .rank-badge {
            background: #2d6a4f;
            color: white;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.85em;
            font-weight: bold;
        }
        .table-wrapper {
            max-height: 75vh;
            overflow-y: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 8px 10px;
            text-align: center;
            border-bottom: 1px solid #ddd;
            font-size: 0.95em;
        }
        th {
            background-color: #2d6a4f;
            color: white;
            position: sticky;
            top: 0;
        }
        .pos-diff { color: #2d6a4f; font-weight: bold; }
        .neg-diff { color: #d90429; font-weight: bold; }
        .zero-diff { color: #666; }
        
        /* צבעים לפי שלבי הנוקאאוט והבתים */
        .stage-g { background-color: #d8f3dc; font-size: 0.85em; font-weight: bold; border-radius: 4px; }
        .stage-4 { background-color: #e2eafc; font-size: 0.85em; }
        .stage-8 { background-color: #f0efa6; font-size: 0.85em; }
        .stage-16 { background-color: #fad2e1; font-size: 0.85em; }
        .stage-32 { background-color: #ffe5ec; font-size: 0.85em; }
        .stage-b { background-color: #f8f9fa; color: #888; font-size: 0.85em; }
    </style>
</head>
<body>

    <h1>📊 סידור מונדיאל ומחשבון פערים אישי</h1>
    
    <div class="container">
        <!-- פאנל סידור ידני -->
        <div class="panel">
            <h2>🥇 סדר את המיקומים (גרור והזז)</h2>
            <div class="instruction">תפוס נבחרת וגרור אותה למעלה או למטה כדי לקבוע את מיקומה הסופי</div>
            <ul class="sortable-list" id="teams-list">
                <!-- ייטען דינמית -->
            </ul>
        </div>

        <!-- פאנל טבלת הפרשים וחלוקה לשלבים -->
        <div class="panel">
            <h2>📈 ניתוח פערים מול דירוג פיפ"א</h2>
            <div class="instruction">השלבים וההפרשים מחושבים אוטומטית בזמן אמת</div>
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>מיקום</th>
                            <th>שלב הגעה</th>
                            <th>נבחרת</th>
                            <th>דירוג פיפ"א</th>
                            <th>הפרש</th>
                        </tr>
                    </thead>
                    <tbody id="analysis-table-body">
                        <!-- שורות ייטענו כאן -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // רשימת הנבחרות המדויקת של מונדיאל 2026 עם דירוג פיפ"א הרשמי שלהן ערב הטורניר
        const teamsData = [
            { name: "ארגנטינה 🇦🇷", fifa: 1 },
            { name: "ספרד 🇪🇸", fifa: 2 },
            { name: "צרפת 🇫🇷", fifa: 3 },
            { name: "אנגליה 🏴󠁧󠁢󠁥󠁮󠁧󠁿", fifa: 4 },
            { name: "פורטוגל 🇵🇹", fifa: 5 },
            { name: "ברזיל 🇧🇷", fifa: 6 },
            { name: "מרוקו 🇲🇦", fifa: 7 },
            { name: "הולנד 🇳🇱", fifa: 8 },
            { name: "בלגיה 🇧🇪", fifa: 9 },
            { name: "גרמניה 🇩🇪", fifa: 10 },
            { name: "קרואטיה 🇭🇷", fifa: 11 },
            { name: "קולומביה 🇨🇴", fifa: 13 },
            { name: "מקסיקו 🇲🇽", fifa: 14 },
            { name: "סנגל 🇸🇳", fifa: 15 },
            { name: "אורוגוואי 🇺🇾", fifa: 16 },
            { name: "ארצות הברית 🇺🇸", fifa: 17 },
            { name: "יפן 🇯🇵", fifa: 18 },
            { name: "שווייץ 🇨🇭", fifa: 19 },
            { name: "איראן 🇮🇷", fifa: 20 },
            { name: "דנמרק 🇩🇰", fifa: 21 },
            { name: "אקוודור 🇪🇨", fifa: 23 },
            { name: "דרום קוריאה 🇰🇷", fifa: 25 },
            { name: "אוסטרליה 🇦🇺", fifa: 27 },
            { name: "אלג'יריה 🇩🇿", fifa: 28 },
            { name: "מצרים 🇪🇬", fifa: 29 },
            { name: "קנדה 🇨🇦", fifa: 30 },
            { name: "נורווגיה 🇳🇴", fifa: 31 },
            { name: "אוקראינה 🇺🇦", fifa: 32 },
            { name: "חוף השנהב 🇨🇮", fifa: 33 },
            { name: "פנמה 🇵🇦", fifa: 34 },
            { name: "ניגריה 🇳🇬", fifa: 36 },
            { name: "פולין 🇵🇱", fifa: 37 },
            { name: "פרגוואי 🇵🇾", fifa: 41 },
            { name: "קמרון 🇨🇲", fifa: 44 },
            { name: "תוניסיה 🇹🇳", fifa: 45 },
            { name: "קונגו DR 🇨🇩", fifa: 46 },
            { name: "מאלי 🇲🇱", fifa: 47 },
            { name: "רומניה 🇷🇴", fifa: 48 },
            { name: "אוזבקיסטן 🇺🇿", fifa: 50 },
            { name: "צ'ילה 🇨🇱", fifa: 51 },
            { name: "פרו 🇵🇪", fifa: 52 },
            { name: "קוסטה ריקה 🇨🇷", fifa: 53 },
            { name: "קטר 🇶🇦", fifa: 56 },
            { name: "עיראק 🇮🇶", fifa: 57 },
            { name: "דרום אפריקה 🇿🇦", fifa: 60 },
            { name: "ערב הסעודית 🇸🇦", fifa: 61 },
            { name: "ירדן 🇯🇴", fifa: 63 },
            { name: "כף ורדה 🇨🇻", fifa: 67 }
        ];

        const idMap = {};
        teamsData.forEach((t, idx) => { idMap[idx] = t; });

        const listContainer = document.getElementById('teams-list');

        function initList() {
            teamsData.forEach((team, index) => {
                const li = document.createElement('li');
                li.draggable = true;
                li.dataset.id = index;
                li.innerHTML = `
                    <span>${team.name}</span>
                    <span class="rank-badge">פיפ"א: ${team.fifa}</span>
                `;
                listContainer.appendChild(li);
            });
        }

        initList();

        // חלוקת המיקומים לשלבי המונדיאל
        function getStageInfo(rank) {
            if (rank === 1) return { text: "🥇 אלופה", className: "stage-g" };
            if (rank === 2) return { text: "🥈 סגנית", className: "stage-g" };
            if (rank === 3) return { text: "🥉 מקום 3", className: "stage-4" };
            if (rank === 4) return { text: "מקום 4", className: "stage-4" };
            if (rank >= 5 && rank <= 8) return { text: "רבע גמר", className: "stage-8" };
            if (rank >= 9 && rank <= 16) return { text: "שמינית גמר", className: "stage-16" };
            if (rank >= 17 && rank <= 32) return { text: "32 האחרונות", className: "stage-32" };
            return { text: "שלב הבתים", className: "stage-b" };
        }

        // לוגיקת גרירה
        listContainer.addEventListener('dragstart', (e) => {
            if (e.target.tagName === 'LI') e.target.classList.add('dragging');
        });

        listContainer.addEventListener('dragend', (e) => {
            if (e.target.tagName === 'LI') {
                e.target.classList.remove('dragging');
                updateAnalysisTable();
            }
        });

        listContainer.addEventListener('dragover', (e) => {
            e.preventDefault();
            const draggingItem = document.querySelector('.dragging');
            const siblings = [...listContainer.querySelectorAll('li:not(.dragging)')];
            
            let nextSibling = siblings.find(sibling => {
                return e.clientY <= sibling.getBoundingClientRect().top + sibling.getBoundingClientRect().height / 2;
            });
            
            listContainer.insertBefore(draggingItem, nextSibling);
        });

        function updateAnalysisTable() {
            const tbody = document.getElementById('analysis-table-body');
            tbody.innerHTML = '';
            
            const currentOrder = [...listContainer.querySelectorAll('li')];
            
            currentOrder.forEach((li, index) => {
                const teamId = li.dataset.id;
                const team = idMap[teamId];
                const myRank = index + 1;
                const diff = team.fifa - myRank; 
                
                let diffClass = 'zero-diff';
                let diffText = diff.toString();
                if (diff > 0) {
                    diffClass = 'pos-diff';
                    diffText = `+${diff}`;
                } else if (diff < 0) {
                    diffClass = 'neg-diff';
                }
                
                const stageInfo = getStageInfo(myRank);
                
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><strong>${myRank}</strong></td>
                    <td class="${stageInfo.className}">${stageInfo.text}</td>
                    <td>${team.name}</td>
                    <td>${team.fifa}</td>
                    <td class="${diffClass}">${diffText}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        updateAnalysisTable();
    </script>
</body>
</html>
