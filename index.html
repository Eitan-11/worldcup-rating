<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>诪讞砖讘讜谉 讛驻专砖讬 诪讜谞讚讬讗诇 2026</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
            color: #333;
        }
        h1, h2 {
            text-align: center;
            color: #1b4332;
        }
        .container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
            max-width: 1200px;
            margin: 0 auto;
        }
        .panel {
            flex: 1;
            min-width: 300px;
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .instruction {
            font-size: 0.9em;
            color: #666;
            text-align: center;
            margin-bottom: 15px;
        }
        ul.sortable-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        ul.sortable-list li {
            background: #e9ecef;
            padding: 10px 15px;
            margin-bottom: 8px;
            border-radius: 4px;
            cursor: grab;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-right: 4px solid #2d6a4f;
            transition: background 0.2s;
            user-select: none;
        }
        ul.sortable-list li:active {
            cursor: grabbing;
        }
        ul.sortable-list li.dragging {
            opacity: 0.5;
            background: #d8f3dc;
        }
        .rank-badge {
            background: #2d6a4f;
            color: white;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.85em;
            font-weight: bold;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        th, td {
            padding: 10px;
            text-align: center;
            border-bottom: 1px solid #ddd;
        }
        th {
            background-color: #2d6a4f;
            color: white;
        }
        .pos-diff {
            color: #2d6a4f;
            font-weight: bold;
        }
        .neg-diff {
            color: #d90429;
            font-weight: bold;
        }
        .zero-diff {
            color: #666;
        }
    </style>
</head>
<body>

    <h1>馃搳 诪讞砖讘讜谉 住讟讟讬住讟讬 讗讬砖讬: 诪讜谞讚讬讗诇 2026</h1>
    
    <div class="container">
        <!-- 驻讗谞诇 住讬讚讜专 讬讚谞讬 -->
        <div class="panel">
            <h2>馃 拽讘注 讗转 住讚专 讛诪讜谞讚讬讗诇</h2>
            <div class="instruction">讙专讜专 讜讛讝讝 讗转 讛谞讘讞专讜转 诪诇诪注诇讛 诇诪讟讛 讻讚讬 诇拽讘讜注 讗转 讛诪讬拽讜诐 讛住讜驻讬 砖诇讛谉</div>
            <ul class="sortable-list" id="teams-list">
                <!-- 谞讘讞专讜转 讬讬讟注谞讜 讻讗谉 讚讬谞诪讬转 -->
            </ul>
        </div>

        <!-- 驻讗谞诇 讟讘诇转 讛驻专砖讬诐 讗讜讟讜诪讟讬转 -->
        <div class="panel">
            <h2>馃搱 讟讘诇转 驻注专讬诐 诪讜诇 讚讬专讜讙 驻讬驻"讗</h2>
            <div class="instruction">讛讟讘诇讛 诪转注讚讻谞转 讗讜讟讜诪讟讬转 诇驻讬 讛住讬讚讜专 砖诇讱</div>
            <table>
                <thead>
                    <tr>
                        <th>诪讬拽讜诐 砖诇讱</th>
                        <th>谞讘讞专转</th>
                        <th>驻讬驻"讗 (讬讜谞讬 '26)</th>
                        <th>讛驻专砖 驻注专</th>
                    </tr>
                </thead>
                <tbody id="analysis-table-body">
                    <!-- 砖讜专讜转 讬讬讟注谞讜 讻讗谉 -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // 专砖讬诪转 讛谞讘讞专讜转 讘诪讜谞讚讬讗诇 2026 注诐 讚讬专讜讙 驻讬驻"讗 讛专砖诪讬 诪讬讜谞讬 2026
        const teamsData = [
            { name: "讗专讙谞讟讬谞讛 馃嚘馃嚪", fifa: 1 },
            { name: "住驻专讚 馃嚜馃嚫", fifa: 2 },
            { name: "爪专驻转 馃嚝馃嚪", fifa: 3 },
            { name: "讗谞讙诇讬讛 馃彺鬆仹鬆仮鬆仴鬆伄鬆仹鬆伩", fifa: 4 },
            { name: "驻讜专讟讜讙诇 馃嚨馃嚬", fifa: 5 },
            { name: "讘专讝讬诇 馃嚙馃嚪", fifa: 6 },
            { name: "诪专讜拽讜 馃嚥馃嚘", fifa: 7 },
            { name: "讛讜诇谞讚 馃嚦馃嚤", fifa: 8 },
            { name: "讘诇讙讬讛 馃嚙馃嚜", fifa: 9 },
            { name: "讙专诪谞讬讛 馃嚛馃嚜", fifa: 10 },
            { name: "拽专讜讗讟讬讛 馃嚟馃嚪", fifa: 11 },
            { name: "拽讜诇讜诪讘讬讛 馃嚚馃嚧", fifa: 13 },
            { name: "诪拽住讬拽讜 馃嚥馃嚱", fifa: 14 },
            { name: "住谞讙诇 馃嚫馃嚦", fifa: 15 },
            { name: "讗讜专讜讙讜讜讗讬 馃嚭馃嚲", fifa: 16 },
            { name: "讗专爪讜转 讛讘专讬转 馃嚭馃嚫", fifa: 17 },
            { name: "讬驻谉 馃嚡馃嚨", fifa: 18 },
            { name: "砖讜讜讬讬抓 馃嚚馃嚟", fifa: 19 },
            { name: "讗讬专讗谉 馃嚠馃嚪", fifa: 20 },
            { name: "讟讜专拽讬讛 馃嚬馃嚪", fifa: 22 },
            { name: "讗拽讜讜讚讜专 馃嚜馃嚚", fifa: 23 },
            { name: "讗讜住讟专讬讛 馃嚘馃嚬", fifa: 24 },
            { name: "讚专讜诐 拽讜专讬讗讛 馃嚢馃嚪", fifa: 25 },
            { name: "讗讜住讟专诇讬讛 馃嚘馃嚭", fifa: 27 },
            { name: "讗诇讙'讬专讬讛 馃嚛馃嚳", fifa: 28 },
            { name: "诪爪专讬诐 馃嚜馃嚞", fifa: 29 },
            { name: "拽谞讚讛 馃嚚馃嚘", fifa: 30 },
            { name: "谞讜专讜讜讙讬讛 馃嚦馃嚧", fifa: 31 },
            { name: "讗讜拽专讗讬谞讛 馃嚭馃嚘", fifa: 32 },
            { name: "讞讜祝 讛砖谞讛讘 馃嚚馃嚠", fifa: 33 },
            { name: "驻谞诪讛 馃嚨馃嚘", fifa: 34 },
            { name: "砖讜讜讚讬讛 馃嚫馃嚜", fifa: 38 },
            { name: "爪'讻讬讛 馃嚚馃嚳", fifa: 40 },
            { name: "驻专讙讜讜讗讬 馃嚨馃嚲", fifa: 41 },
            { name: "住拽讜讟诇谞讚 馃彺鬆仹鬆仮鬆伋鬆仯鬆伌鬆伩", fifa: 42 },
            { name: "拽诪专讜谉 馃嚚馃嚥", fifa: 44 },
            { name: "转讜谞讬住讬讛 馃嚬馃嚦", fifa: 45 },
            { name: "拽讜谞讙讜 DR 馃嚚馃嚛", fifa: 46 },
            { name: "讗讜讝讘拽讬住讟谉 馃嚭馃嚳", fifa: 50 },
            { name: "爪'讬诇讛 馃嚚馃嚤", fifa: 51 },
            { name: "驻专讜 馃嚨馃嚜", fifa: 52 },
            { name: "拽讜住讟讛 专讬拽讛 馃嚚馃嚪", fifa: 53 },
            { name: "拽讟专 馃嚩馃嚘", fifa: 56 },
            { name: "注讬专讗拽 馃嚠馃嚩", fifa: 57 },
            { name: "讚专讜诐 讗驻专讬拽讛 馃嚳馃嚘", fifa: 60 },
            { name: "注专讘 讛住注讜讚讬转 馃嚫馃嚘", fifa: 61 },
            { name: "讬专讚谉 馃嚡馃嚧", fifa: 63 },
            { name: "讘讜住谞讬讛 讜讛专爪讙讜讘讬谞讛 馃嚙馃嚘", fifa: 64 },
            { name: "讻祝 讜专讚讛 馃嚚馃嚮", fifa: 67 }
        ];

        const idMap = {};
        teamsData.forEach((t, index) => {
            idMap[index] = t;
        });

        const listContainer = document.getElementById('teams-list');

        // 讗转讞讜诇 讛专砖讬诪讛 讛讙专驻讬
        function initList() {
            teamsData.forEach((team, index) => {
                const li = document.createElement('li');
                li.draggable = true;
                li.dataset.id = index;
                li.innerHTML = `
                    <span>${team.name}</span>
                    <span class="rank-badge">驻讬驻"讗: ${team.fifa}</span>
                `;
                listContainer.appendChild(li);
            });
        }

        initList();

        // 诇讜讙讬拽转 讙专讬专讛 讜砖讞专讜专 (Drag and Drop)
        listContainer.addEventListener('dragstart', (e) => {
            if (e.target.tagName === 'LI') {
                e.target.classList.add('dragging');
            }
        });

        listContainer.addEventListener('dragend', (e) => {
            if (e.target.tagName === 'LI') {
                e.target.classList.remove('dragging');
                updateAnalysisTable();
            }
        });

        listContainer.addEventListener('dragover', (e) => {
            e.preventDefault();
            const draggingItem = document.querySelector('.dragging');
            const siblings = [...listContainer.querySelectorAll('li:not(.dragging)')];
            
            let nextSibling = siblings.find(sibling => {
                return e.clientY <= sibling.getBoundingClientRect().top + sibling.getBoundingClientRect().height / 2;
            });
            
            listContainer.insertBefore(draggingItem, nextSibling);
        });

        // 注讚讻讜谉 讟讘诇转 讛谞讬转讜讞 讛住讟讟讬住讟讬
        function updateAnalysisTable() {
            const tbody = document.getElementById('analysis-table-body');
            tbody.innerHTML = '';
            
            const currentOrder = [...listContainer.querySelectorAll('li')];
            
            currentOrder.forEach((li, index) => {
                const teamId = li.dataset.id;
                const team = idMap[teamId];
                const myRank = index + 1;
                const diff = team.fifa - myRank; // 讞讬讜讘讬 = 讛驻转讬注讛 诇讟讜讘讛, 砖诇讬诇讬 = 讗讬讻讝讘讛
                
                let diffClass = 'zero-diff';
                let diffText = diff.toString();
                if (diff > 0) {
                    diffClass = 'pos-diff';
                    diffText = `+${diff}`;
                } else if (diff < 0) {
                    diffClass = 'neg-diff';
                }
                
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><strong>${myRank}</strong></td>
                    <td>${team.name}</td>
                    <td>${team.fifa}</td>
                    <td class="${diffClass}">${diffText}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        // 讛专爪讛 专讗砖讜谞讬转 砖诇 讛讟讘诇讛
        updateAnalysisTable();
    </script>
</body>
</html>
